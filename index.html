function pad(n){return String(Math.floor(n)).padStart(2,"0");}
function fmtTime(d){if(!d)return"—";return d.toLocaleTimeString("en-ZA",{hour:"2-digit",minute:"2-digit"});}

/* ─── NOTIFICATIONS (Capacitor LocalNotifications native, web Notification fallback) ─── */
const Cap=(typeof window!=="undefined")&&window.Capacitor;
const LN=Cap&&Cap.Plugins&&Cap.Plugins.LocalNotifications;
function nativeNotifs(){return !!LN;}
async function reqNotifPerm(){
  try{
    if(LN){const r=await LN.requestPermissions();return (r.display||r.receive)==="granted";}
    if("Notification"in window){const p=await Notification.requestPermission();return p==="granted";}
  }catch(e){}
  return false;
}
async function checkNotifPerm(){
  try{
    if(LN){const r=await LN.checkPermissions();return (r.display||r.receive)==="granted";}
    if("Notification"in window)return Notification.permission==="granted";
  }catch(e){}
  return false;
}
/* immediate / "now" notification */
function sendNote(t,b){
  if(LN){LN.schedule({notifications:[{id:Math.floor(Math.random()*1000000)+500000,title:"💖 "+t,body:b||"",schedule:{at:new Date(Date.now()+250)}}]}).catch(()=>{});return;}
  if("Notification"in window&&Notification.permission==="granted")new Notification("💖 "+t,{body:b});
}
/* one-off scheduled notification at a future Date. returns true if natively scheduled */
function scheduleAt(id,t,b,date){
  if(LN){LN.schedule({notifications:[{id,title:"💖 "+t,body:b||"",schedule:{at:date,allowWhileIdle:true}}]}).catch(()=>{});return true;}
  return false;
}
/* daily repeating notification at hour:minute. returns true if natively scheduled */
function scheduleDaily(id,t,b,hour,minute){
  if(LN){LN.schedule({notifications:[{id,title:"💖 "+t,body:b||"",schedule:{on:{hour,minute},repeats:true,allowWhileIdle:true}}]}).catch(()=>{});return true;}
  return false;
}
function cancelNotif(id){if(LN){LN.cancel({notifications:[{id}]}).catch(()=>{});}}

const motivators=["every hour is rewriting your story.","your body and spirit are growing stronger.","keep flowing — you are unstoppable.","heaven is cheering you on.","discipline today, freedom tomorrow.","you are doing something most people never will.","one day closer to your breakthrough."];
function motivate(done,total){
  if(done<=0)return"Your journey begins today. One day at a time. 💖";
  if(done>=total)return`All ${total} days complete! You finished what you started. 👑🎉`;
  const left=total-done;
  const ord=done===1?"Day one is done!":`Day ${done} is done!`;
  return`${ord} ${left} to go — ${motivators[(done-1)%motivators.length]}`;
}

              <div style={{margin:"16px 0 6px",background:"rgba(255,48,133,0.1)",borderRadius:"10px",height:"8px",overflow:"hidden"}}>
                <div style={{width:`${(doneDays.length/21)*100}%`,height:"100%",background:`linear-gradient(90deg,${P.accentDeep},${P.accentSoft})`,borderRadius:"10px",transition:"width 0.5s"}}/>
              </div>
              <div style={{fontSize:"11px",color:P.textFaint}}>{doneDays.length} of 21 days completed 💖</div>
            </div>

            <div style={{overflowX:"auto",paddingBottom:"8px",marginBottom:"16px"}}>
              <div style={{display:"flex",gap:"7px",minWidth:"max-content"}}>
                {bibleReadingPlan.map(d=>{const done=doneDays.includes(d.day),active=bibleDay===d.day;return(
                  <button key={d.day} onClick={()=>goDay(d.day)} style={{minWidth:"38px",height:"38px",borderRadius:"50%",border:"none",background:active?`linear-gradient(135deg,${P.accentDeep},${P.accent})`:done?"rgba(216,27,96,0.16)":"rgba(216,27,96,0.06)",color:active?"#fff":done?P.accentSoft:P.textFaint,fontWeight:active?"bold":"normal",fontSize:"12px",cursor:"pointer",fontFamily:"inherit",boxShadow:active?`0 4px 18px ${P.accentGlow}`:"none",transition:"all 0.2s"}}>
                    {done&&!active?"✓":d.day}
                  </button>
                );})}
              </div>
            </div>

            <div style={C({background:"rgba(255,255,255,0.85)",border:`1px solid ${P.accent}`,boxShadow:`0 6px 24px rgba(216,27,96,0.18), inset 0 1px 0 rgba(255,255,255,0.6)`})}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}}>
                <div>
                  <div style={{fontSize:"10px",color:P.textFaint,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"5px"}}>Day {todayBible.day} of 21 · {todayBible.section}</div>
                  <div style={{fontSize:"19px",color:P.gold,fontWeight:"bold"}}>{todayBible.title}</div>
                </div>
                {isBibleDone&&<div style={{fontSize:"24px"}}>✅</div>}
              </div>
              <a href={todayBible.url} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:"10px",padding:"13px 15px",background:"rgba(255,48,133,0.1)",borderRadius:"14px",marginBottom:"18px",border:`1px solid rgba(255,80,150,0.22)`,textDecoration:"none",boxShadow:"inset 0 1px 0 rgba(255,200,230,0.05)"}}>
                <span style={{fontSize:"20px"}}>📖</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"13px",color:P.accentSoft,fontWeight:"bold"}}>{todayBible.ref}</div>
                  <div style={{fontSize:"11px",color:P.textFaint,marginTop:"2px"}}>Tap to read on Bible.com →</div>
                </div>
                <span style={{fontSize:"17px",color:P.accent}}>›</span>
              </a>
              <div style={{fontSize:"14px",color:P.textSub,lineHeight:1.9,marginBottom:"20px"}}>{todayBible.devotion}</div>
              <div style={{background:"rgba(255,48,133,0.08)",borderRadius:"14px",padding:"15px",borderLeft:`3px solid ${P.accentDeep}`,marginBottom:"20px"}}>
                <div style={{fontSize:"10px",color:P.textFaint,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"7px"}}>✍️ Reflect</div>
                <div style={{fontSize:"13px",color:P.textSub,lineHeight:1.75,fontStyle:"italic"}}>{reflections[todayBible.day%5]}</div>
              </div>
              <div style={{display:"flex",gap:"10px"}}>
                {!isBibleDone?(
                  <button onClick={markDone} style={{...BT(P.btnPrimary),flex:1,padding:"15px"}}>✅ Mark Day {todayBible.day} Complete{bibleDay<21?" → Day "+(todayBible.day+1):""}</button>
                ):(
                  <button onClick={()=>{if(bibleDay<21)goDay(bibleDay+1);}} style={{...BT("rgba(255,48,133,0.1)"),flex:1,padding:"15px",color:P.accentSoft,border:`1px solid rgba(255,80,150,0.22)`,boxShadow:"none"}}>{bibleDay<21?"➡️ Go to Day "+(bibleDay+1):"🎉 Plan Complete!"}</button>
                )}
                {bibleDay>1&&<button onClick={()=>goDay(bibleDay-1)} style={{padding:"15px 17px",borderRadius:"16px",border:`1px solid rgba(255,80,150,0.22)`,background:"transparent",color:P.textFaint,cursor:"pointer",fontFamily:"inherit",fontSize:"15px"}}>←</button>}
              </div>
            </div>

            <div style={C()}>
              <div style={{fontSize:"13px",color:P.accentSoft,fontWeight:"bold",marginBottom:"14px",letterSpacing:"0.3px"}}>📋 Plan Overview</div>
              {[{section:"I: Humble",days:"Days 1–7",desc:"Begin with humility. Understand the heart of the Daniel Fast.",icon:"🙏"},{section:"II: Pray",days:"Days 8–14",desc:"Build a lifestyle of prayer. Intercede as Daniel did.",icon:"💬"},{section:"III: Believe",days:"Days 15–21",desc:"Stand in faith. Believe for your breakthrough. Finish strong.",icon:"💪"}].map(s=>(
                <div key={s.section} style={{display:"flex",gap:"12px",padding:"13px",borderRadius:"14px",marginBottom:"8px",background:todayBible.section===s.section?"rgba(216,27,96,0.1)":"rgba(216,27,96,0.04)",border:todayBible.section===s.section?`1px solid rgba(216,27,96,0.28)`:"1px solid transparent",transition:"all 0.2s"}}>
                  <span style={{fontSize:"22px"}}>{s.icon}</span>
                  <div>
                    <div style={{fontSize:"13px",color:todayBible.section===s.section?P.accentSoft:P.textSub,fontWeight:"bold"}}>{s.section} — {s.days}</div>
                    <div style={{fontSize:"11px",color:P.textFaint,marginTop:"3px",lineHeight:1.5}}>{s.desc}</div>
                  </div>
                </div>
              ))}
              <div style={{marginTop:"12px",padding:"13px",background:"rgba(255,48,133,0.07)",borderRadius:"14px"}}>
                <div style={{fontSize:"11px",color:P.textFaint,letterSpacing:"1px",textTransform:"uppercase",marginBottom:"5px"}}>📚 Full Plan on YouVersion</div>
                <a href="https://www.bible.com/reading-plans/10826-fast-like-daniel" target="_blank" rel="noopener noreferrer" style={{fontSize:"12px",color:P.accentSoft,textDecoration:"none"}}>Open on Bible.com →</a>
              </div>
            </div>
            {doneDays.length>0&&<button onClick={()=>{if(window.confirm("Reset Bible reading progress?")){setDoneDays([]);setBibleDay(1);lss("ff_completeddays","[]");lss("ff_bibleday","1");}}} style={{...BT("rgba(180,20,80,0.14)"),color:"#c2185b",border:"1px solid rgba(180,20,80,0.28)",boxShadow:"none",marginTop:"4px"}}>🔄 Reset Reading Progress</button>}
          </>
        )}

        {/* ══════════════════════════════════════════════
            HISTORY TAB
        ══════════════════════════════════════════════ */}
        {tab==="history"&&(
          <>
            <div style={C()}>
              <div style={{fontSize:"16px",color:P.accentSoft,fontWeight:"bold",marginBottom:"5px",letterSpacing:"0.3px"}}>📊 Your Fast History</div>
              <div style={{fontSize:"12px",color:P.textSub}}>Last 30 days of fasting logged below 💖</div>
            </div>
            {history.length===0?(
              <div style={{...C(),textAlign:"center",padding:"40px 20px"}}>
                <div style={{fontSize:"44px",marginBottom:"14px"}}>📋</div>
                <div style={{fontSize:"14px",color:P.textSub,fontWeight:"bold"}}>No fasts logged yet, gorgeous.</div>
                <div style={{fontSize:"12px",color:P.textFaint,marginTop:"8px",lineHeight:1.6}}>Start your first fast on the Timer tab! 💖</div>
              </div>
            ):(
              <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"16px"}}>
                  {[{label:"Total Fasts",val:history.length},{label:"Completed",val:history.filter(h=>h.completed).length},{label:"Avg Hours",val:(history.reduce((a,h)=>a+parseFloat(h.hoursCompleted||0),0)/history.length).toFixed(1)}].map(s=>(
                    <div key={s.label} style={{...C({margin:0}),textAlign:"center"}}>
                      <div style={{fontSize:"24px",color:P.accentSoft,fontWeight:"bold"}}>{s.val}</div>
                      <div style={{fontSize:"10px",color:P.textSub,marginTop:"3px",letterSpacing:"0.5px"}}>{s.label}</div>
                    </div>
                  ))}
                </div>
                <div style={{...C({background:"linear-gradient(135deg,rgba(255,236,244,0.9),rgba(255,224,238,0.85))",border:`1px solid rgba(216,27,96,0.22)`,marginBottom:"16px",boxShadow:`0 6px 22px rgba(216,27,96,0.16), inset 0 1px 0 rgba(255,255,255,0.6)`}),textAlign:"center"}}>
                  <div style={{fontSize:"30px",marginBottom:"6px"}}>🔥</div>
                  <div style={{fontSize:"24px",color:P.gold,fontWeight:"bold"}}>{history.filter(h=>h.completed).length} Completed Fasts</div>
                  <div style={{fontSize:"12px",color:P.textSub,marginTop:"6px"}}>Keep the streak alive — you are unstoppable! 💖</div>
                </div>
                {history.map((h,i)=>(
                  <div key={i} style={C({border:h.completed?`1px solid rgba(255,80,150,0.32)`:`1px solid ${P.cardBorder}`})}>
                    <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                      <div style={{fontSize:"26px"}}>{h.completed?"✅":"⏸"}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"14px",color:P.accentSoft,fontWeight:"bold"}}>{h.date}</div>
                        <div style={{fontSize:"11px",color:P.textFaint,marginTop:"2px"}}>{h.startedAt} → {h.endedAt} · {h.hoursCompleted}h fasted</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:"11px",color:P.waterAccent}}>💧 {h.water}/{WATER_GOAL}</div>
                        <div style={{fontSize:"11px",color:P.textSub,marginTop:"2px"}}>🫖 {h.rooibos}/{ROOIBOS_GOAL}</div>
                      </div>
                    </div>
                  </div>
                ))}
                <button onClick={()=>{if(window.confirm("Clear all history?")){setHistory([]);try{localStorage.removeItem("ff_history");}catch{}}}} style={{...BT("rgba(180,20,80,0.18)"),color:"#c2185b",border:"1px solid rgba(180,20,80,0.32)",boxShadow:"none",marginTop:"8px"}}>🗑 Clear History</button>
              </>
            )}
          </>
        )}
      </div>

      {/* FOOTER */}
      <div style={{textAlign:"center",padding:"20px",color:P.textFaint,fontSize:"11px",letterSpacing:"1.5px",opacity:0.7}}>
        Daniel Fast 💖 Made with grace for your wellness journey ✨
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
